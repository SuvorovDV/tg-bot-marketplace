services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: mp
      POSTGRES_PASSWORD: mp
    volumes:
      - pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mp -d marketplace"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    command: python -m app.bot   # APScheduler уже встроен в этот процесс
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mp:mp@db:5432/marketplace
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    restart: unless-stopped
    # --proxy-headers + --forwarded-allow-ips=* — доверяем X-Forwarded-Proto от
    # reverse proxy (Caddy), иначе sqladmin генерирует абсолютные URL с http://
    # и браузер блокирует mixed content, когда сайт открыт по https.
    command: uvicorn app.web:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=*
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mp:mp@db:5432/marketplace
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg:
