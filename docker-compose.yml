version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: mp
      POSTGRES_PASSWORD: mp
    volumes:
      - pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  bot:
    build: .
    command: python -m app.bot
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mp:mp@db:5432/marketplace
    depends_on: [db]

  web:
    build: .
    command: uvicorn app.web:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mp:mp@db:5432/marketplace
    ports: ["8000:8000"]
    depends_on: [db]

  scheduler:
    build: .
    command: python -m app.scheduler
  # или `python -m app.scripts.seed` для разовой инициализации
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mp:mp@db:5432/marketplace
    depends_on: [db]

volumes:
  pg:
