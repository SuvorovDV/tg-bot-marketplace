# Fly.io config for the bot worker (also runs APScheduler).
# Deploy: flyctl deploy --config fly.bot.toml --remote-only

app = "tg-bot-mkt-bot"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[experimental]
  cmd = ["python", "-m", "app.bot"]

# No HTTP service — bot uses Telegram long-polling (outbound only).
# Keep one machine always running, otherwise polling stops.
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[deploy]
  strategy = "immediate"
